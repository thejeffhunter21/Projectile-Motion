
<!-- to run, python3 -m http.server 8000 in terminal, http://localhost:8000 into browswer-->
<!DOCTYPE html>
<html>
<head>
    <title>Projectile Motion</title>
</head>
<body>

    <canvas id="canvas" width="800" height="400"></canvas>

    <br>
    Angle: <input type="range" id="angle" min="0" max="90" value="45">
    <span id="angleVal">45</span>°

    <br>
    Speed: <input type="range" id="speed" min="1" max="100" value="25">
    <span id="speedVal">25</span> m/s

    <br>
    <button id="launch">Launch</button>

    <script src="projectile.js"></script>
    <script>
        ProjectileModule().then(function(Module) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            document.getElementById('angle').addEventListener('input', e => {
                document.getElementById('angleVal').textContent = e.target.value;
            });
            document.getElementById('launch').addEventListener('click', () => {
                const angle = Number(document.getElementById('angle').value);
                const speed = Number(document.getElementById('speed').value);
                Module._launch(angle, speed);
                requestAnimationFrame(loop);
            });
            function loop() {
                Module._update(0.016);  // ~60fps timestep
                const x = Module._getX();
                const y = Module._getY();

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.beginPath();
                ctx.arc(x, canvas.height - y, 5, 0, Math.PI * 2);
                ctx.fill();

                if (Module._isActive()) {
                    requestAnimationFrame(loop);
                }
            }
        });
    </script>

</body>
</html>
